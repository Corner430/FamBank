name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: fambank_test
          MYSQL_USER: fambank
          MYSQL_PASSWORD: fambank
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Allow MySQL triggers for non-SUPER user
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "SET GLOBAL log_bin_trust_function_creators = 1;"

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Run backend tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: mysql+aiomysql://fambank:fambank@127.0.0.1:3306/fambank_test
          DATABASE_URL: mysql+aiomysql://fambank:fambank@127.0.0.1:3306/fambank_test
          LOG_LEVEL: WARNING
        run: uv run pytest -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/fambank

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing backend dependencies..."
            cd backend && uv sync && cd ..

            echo "==> Building frontend..."
            cd frontend && npm ci && npm run build && cd ..

            echo "==> Restarting service..."
            sudo systemctl restart fambank

            echo "==> Health check..."
            sleep 3
            curl -sf http://localhost:8000/api/v1/health || { echo "Health check failed!"; exit 1; }

            echo "==> Deploy complete."

  release:
    needs: [test, deploy]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          DATE_TAG="v$(date -u +'%Y.%m.%d')"
          # Check for existing tags with the same date prefix and increment
          EXISTING=$(git tag -l "${DATE_TAG}.*" | sort -V | tail -1)
          if [ -z "$EXISTING" ]; then
            VERSION="${DATE_TAG}.1"
          else
            # Extract the build number and increment
            BUILD_NUM=$(echo "$EXISTING" | grep -oP '\d+$')
            VERSION="${DATE_TAG}.$((BUILD_NUM + 1))"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Generated version: $VERSION"

      - name: Generate release notes
        id: notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          # Generate commit log
          NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges | head -50)
          if [ -z "$NOTES" ]; then
            NOTES="- Maintenance release"
          fi
          # Write to file to handle multiline
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md
